name: artesanias_andinas

description: >
  App de gestión de productos artesanales andinos – SIS048 Desarrollo de Software II
  Unidad II: Clean Architecture + Inversión de Control con get_it

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Inyección de Dependencias ─────────────────────────────────────────────
  get_it: ^7.7.0

  # ── Gestión de Estado ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navegación ────────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Red / HTTP ────────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Firebase / Auth / Firestore (Lab 15-16) ──────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3
  # ── Cámara y Biometría (Lab 18) ──────────────────────────────────────────
  image_picker: ^1.1.2
  local_auth: ^2.3.0

  # ── IA / Gemini Chatbot (Lab 19) ─────────────────────────────────────────
  google_generative_ai: ^0.4.7
  firebase_ai: ^2.0.0
  flutter_markdown: ^0.7.4
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1

  # ── GPS / Geolocalización (Lab 17) ───────────────────────────────────────
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # ── Base de datos local (Lab 11) ─────────────────────────────────────────
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # ── Seguridad / Cifrado (Lab 12) ─────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # ── Utilidades ───────────────────────────────────────────────────────────
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0

  # ── UI ───────────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  drift_dev: ^2.22.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/